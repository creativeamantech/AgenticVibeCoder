name: Build VibeCode APK
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Setup NDK
        run: |
          echo "y" | sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run Lint
        run: ./gradlew lint
        continue-on-error: true
      - name: Run Tests
        run: ./gradlew test
        continue-on-error: true
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Build Release APK
        run: ./gradlew assembleRelease
        continue-on-error: true
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VibeCode-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: VibeCode-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
      - name: Post APK size in summary
        continue-on-error: true
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---" >> $GITHUB_STEP_SUMMARY
          echo "| Debug | $(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | $(du -sh app/build/outputs/apk/release/app-release-unsigned.apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY

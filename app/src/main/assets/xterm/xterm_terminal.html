<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xterm Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.css" />
    <style>
        html, body, #terminal {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0D1117;
            overflow: hidden;
        }
        .xterm-viewport {
            overflow-y: auto !important;
        }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/addon-fit/addon-fit.min.js"></script>
    <script>
        let term = new Terminal({
            fontFamily: 'JetBrains Mono, monospace',
            fontSize: 13,
            theme: {
                background: '#0D1117',
                foreground: '#C9D1D9',
                cursor: '#58A6FF'
            },
            cursorBlink: true,
            convertEol: true
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        window.addEventListener('resize', () => {
            fitAddon.fit();
        });

        let currentLine = '';
        let currentCwd = '/';

        term.onData(e => {
            if (window.Android && window.Android.onUserInput) {
                window.Android.onUserInput(e);
            }

            switch (e) {
                case '\r': // Enter
                    term.write('\r\n');
                    if (window.Android && window.Android.onCommandSubmitted) {
                        window.Android.onCommandSubmitted(currentLine);
                    }
                    currentLine = '';
                    break;
                case '\x7F': // Backspace
                    if (currentLine.length > 0) {
                        currentLine = currentLine.substring(0, currentLine.length - 1);
                        term.write('\b \b');
                    }
                    break;
                default:
                    // Print printable characters
                    if (e >= String.fromCharCode(0x20) && e <= String.fromCharCode(0x7E) || e >= '\u00a0') {
                        currentLine += e;
                        term.write(e);
                    }
                    break;
            }
        });

        window.writeToTerminal = function(text) {
            term.write(text);
        };

        window.clearTerminal = function() {
            term.clear();
        };

        window.writePrompt = function(cwd) {
            currentCwd = cwd;
            term.write('\x1b[32m' + cwd + '\x1b[0m $ ');
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Editor</title>
    <style>
        html, body, #container {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1e1e1e; /* Match vs-dark */
        }
    </style>
</head>
<body>
<div id="container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

    let editor;
    let diffEditor;
    let decorations = [];

    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('container'), {
            value: '',
            language: 'plaintext',
            theme: 'vs-dark',
            fontFamily: 'JetBrains Mono, monospace',
            fontSize: 14,
            lineNumbers: 'on',
            minimap: { enabled: true },
            wordWrap: 'off',
            automaticLayout: true,
            scrollBeyondLastLine: false
        });

        // Content change listener
        editor.onDidChangeModelContent(() => {
            if (window.Android && window.Android.onContentChanged) {
                window.Android.onContentChanged(editor.getValue());
            }
        });

        // Cursor move listener
        editor.onDidChangeCursorPosition((e) => {
            if (window.Android && window.Android.onCursorMoved) {
                window.Android.onCursorMoved(e.position.lineNumber, e.position.column);
            }
        });

        // Save shortcut (Ctrl+S / Cmd+S)
        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() {
            if (window.Android && window.Android.onSaveRequested) {
                window.Android.onSaveRequested();
            }
        });

        // Context Menu Setup
        setupContextMenu();
    });

    function setupContextMenu() {
        const actions = [
            { id: 'explain-code', label: 'Explain Selection', name: 'Explain' },
            { id: 'fix-code', label: 'Fix This', name: 'Fix' },
            { id: 'refactor-code', label: 'Refactor', name: 'Refactor' },
            { id: 'add-docs', label: 'Add Docs', name: 'Docs' }
        ];

        actions.forEach(action => {
            editor.addAction({
                id: action.id,
                label: action.label,
                contextMenuGroupId: 'navigation',
                contextMenuOrder: 1.5,
                run: function(ed) {
                    const selection = ed.getSelection();
                    const text = ed.getModel().getValueInRange(selection);
                    if (window.Android && window.Android.onContextMenuAction) {
                        window.Android.onContextMenuAction(action.name, text);
                    }
                }
            });
        });
    }

    // Exposed API
    window.setContent = function(code, language) {
        if (!editor) return;
        const model = editor.getModel();
        if (model) {
            monaco.editor.setModelLanguage(model, language);
            model.setValue(code);
        }
    };

    window.getContent = function() {
        return editor ? editor.getValue() : '';
    };

    window.setTheme = function(theme) {
        monaco.editor.setTheme(theme);
    };

    window.showGhostText = function(text, lineNumber) {
        if (!editor) return;

        decorations = editor.deltaDecorations(decorations, [
            {
                range: new monaco.Range(lineNumber, 1, lineNumber, 1),
                options: {
                    after: {
                        content: text,
                        inlineClassName: 'ghost-text-style'
                    }
                }
            }
        ]);

        // Inject dynamic style if not present
        if (!document.getElementById('ghost-style')) {
            const style = document.createElement('style');
            style.id = 'ghost-style';
            style.innerHTML = '.ghost-text-style { color: #6e7681; font-style: italic; }';
            document.head.appendChild(style);
        }
    };

    window.acceptGhostText = function() {
        if (!editor || decorations.length === 0) return;
        const model = editor.getModel();
        const range = model.getDecorationRange(decorations[0]);
        if (range) {
            // Need to retrieve the actual ghost text from options, but simpler is keeping state.
            // For now, Android side handles actual insertion by updating content.
            // We just clear decorations here.
            window.dismissGhostText();
            // Call Android back to do the actual text injection?
            // Actually, spec says acceptGhostText() inserts it. We need the text state.
        }
    };

    window.dismissGhostText = function() {
        if (editor) {
            decorations = editor.deltaDecorations(decorations, []);
        }
    };

    window.gotoLine = function(line) {
        if (editor) {
            editor.revealLineInCenter(line);
            editor.setPosition({ lineNumber: line, column: 1 });
        }
    };

    window.findReplace = function(find, replace) {
        if (!editor) return;
        const model = editor.getModel();
        const matches = model.findMatches(find, false, false, false, null, true);
        const ops = matches.map(m => ({
            range: m.range,
            text: replace
        }));
        editor.executeEdits('findReplace', ops);
    };

    window.applyDiff = function(originalCode, modifiedCode) {
        // Destroy normal editor, create diff editor
        const container = document.getElementById('container');
        if (editor) {
            editor.dispose();
            editor = null;
        }

        diffEditor = monaco.editor.createDiffEditor(container, {
            theme: 'vs-dark',
            automaticLayout: true
        });

        const originalModel = monaco.editor.createModel(originalCode, 'plaintext');
        const modifiedModel = monaco.editor.createModel(modifiedCode, 'plaintext');

        diffEditor.setModel({
            original: originalModel,
            modified: modifiedModel
        });
    };

    window.exitDiff = function() {
        if (diffEditor) {
            const modifiedCode = diffEditor.getModel().modified.getValue();
            const language = diffEditor.getModel().modified.getLanguageId();

            diffEditor.dispose();
            diffEditor = null;

            // Recreate normal editor
            editor = monaco.editor.create(document.getElementById('container'), {
                value: modifiedCode,
                language: language,
                theme: 'vs-dark',
                fontFamily: 'JetBrains Mono, monospace',
                fontSize: 14,
                lineNumbers: 'on',
                minimap: { enabled: true },
                wordWrap: 'off',
                automaticLayout: true
            });
            setupContextMenu();
        }
    };
</script>
</body>
</html>
